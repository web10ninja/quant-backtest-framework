name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas scipy matplotlib

      - name: Smoke test - verify imports
        run: |
          python -c "from backtest import walk_forward_test; print('imports OK')"

      - name: Run Monte Carlo self-test (synthetic data, no network)
        run: |
          python backtest/monte_carlo.py

      - name: Run Validation Framework self-test (synthetic data, no network)
        run: |
          python backtest/validation_framework.py
